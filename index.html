<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Entregas - Fijo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a23; --border: #2a3145;
    --accent: #f0c040; --green: #22c55e; --red: #ef4444; --text: #e8ecf4; --muted: #6b7a99;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding-bottom: 100px; }
  
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
  .btn-sync { background: #1e2330; color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); padding: 8px 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .btn-add { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 700; }

  .resumen { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--surface); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
  .card .val { font-family: 'Syne'; font-size: 20px; font-weight: 800; color: var(--accent); }
  
  .lista { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
  .envio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 15px; border-left: 5px solid var(--muted); }
  .envio-card.entregado { border-left-color: var(--green); }
  .envio-card.cancelado { border-left-color: var(--red); opacity: 0.7; }

  .monto-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .monto-row input { background: #1e2330; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; width: 100%; font-weight: 700; }
  
  .btns-estado { display: flex; gap: 5px; margin-top: 10px; }
  .btns-estado button { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: #1e2330; color: var(--muted); cursor: pointer; }
  .btns-estado button.active { background: var(--accent); color: #000; font-weight: 700; }

  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; align-items:center; padding: 20px; }
  .modal.open { display:flex; }
  .modal-cont { background: var(--surface); width: 100%; padding: 20px; border-radius: 20px; }
  .modal-cont input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1e2330; border: 1px solid var(--border); color: #fff; border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
  <div><h1 style="font-family:'Syne'; font-size:18px; color:var(--accent)">MIS ENTREGAS</h1></div>
  <div style="display:flex; gap:8px;">
    <button class="btn-sync" id="btnSync" onclick="cargar(true)">🔄 Actualizar</button>
    <button class="btn-add" onclick="abrir()">+ Nuevo</button>
  </div>
</div>

<div class="resumen">
  <div class="card"><div>Vendido</div><div class="val" id="resVendido">₲ 0</div></div>
  <div class="card"><div>A Rendir</div><div class="val" id="resRendir" style="color:var(--green)">₲ 0</div></div>
</div>

<div id="lista" class="lista"></div>

<div class="modal" id="modal">
  <div class="modal-cont">
    <h2 style="margin-bottom:15px">Nuevo Envío</h2>
    <input type="text" id="inNom" placeholder="Nombre Cliente">
    <input type="text" id="inCiu" placeholder="Ciudad">
    <input type="number" id="inMon" placeholder="Monto Pedido">
    <input type="number" id="inFle" placeholder="Flete">
    <button onclick="guardar()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; font-weight:800;">GUARDAR</button>
    <button onclick="cerrar()" style="width:100%; padding:10px; background:none; color:var(--muted); border:none; margin-top:5px;">Cancelar</button>
  </div>
</div>
