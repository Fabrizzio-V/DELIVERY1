<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Entregas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a23; --surface2: #1e2330; --border: #2a3145;
    --accent: #f0c040; --accent2: #3b82f6; --green: #22c55e; --red: #ef4444;
    --orange: #f97316; --text: #e8ecf4; --muted: #6b7a99; --card-r: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 100px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header-btns { display: flex; gap: 8px; }
  .btn-sync { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(59,130,246,0.3); border-radius: 10px; padding: 8px 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-sync.syncing { opacity: 0.5; pointer-events: none; }
  .btn-add-top { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 8px 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; }
  .resumen { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .resumen-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 14px; position: relative; overflow: hidden; }
  .resumen-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .resumen-card.total::before { background: var(--accent); }
  .resumen-card.entregado::before { background: var(--green); }
  .resumen-card .label { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:500; }
  .resumen-card .monto { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-top:5px; }
  .filtros { padding: 0 16px 14px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filtro-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 12px; white-space: nowrap; cursor: pointer; }
  .filtro-btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
  .lista { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .envio-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); overflow: hidden; border-left: 4px solid var(--muted); }
  .envio-card.entregado { border-left-color: var(--green); }
  .envio-card.cancelado { border-left-color: var(--red); opacity: 0.8; }
  .envio-header { padding: 14px; }
  .envio-nombre { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; }
  .envio-ciudad { font-size:12px; color:var(--muted); }
  .envio-montos { padding: 0 14px 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .monto-field label { font-size:9px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:2px; }
  .monto-field input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); width:100%; padding:5px; font-weight:700; outline:none; }
  .estado-ciclo { display: flex; gap: 5px; padding: 0 14px 10px; }
  .ciclo-btn { flex:1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; cursor: pointer; }
  .ciclo-btn.active-entregado { background: var(--green); color: #000; font-weight: bold; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 1000; display: none; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:flex-end; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); width:100%; padding:20px; border-radius:20px 20px 0 0; }
  .field { margin-bottom:15px; }
  .field label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; }
  .field input { width:100%; background:var(--surface2); border:1px solid var(--border); padding:12px; border-radius:10px; color:#fff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1 id="titulo">MIS ENTREGAS</h1>
      <div style="font-size: 11px; color: var(--muted);" id="fechaDisplay"></div>
    </div>
    <div class="header-btns">
      <button class="btn-sync" id="btnSync" onclick="cargarDesdeSheets(true)">🔄 Actualizar</button>
      <button class="btn-add-top" onclick="abrirModal()">+ Nuevo</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="resumen">
  <div class="resumen-card total">
    <div class="label">Total Pedidos</div>
    <div class="monto" id="resTotal">₲ 0</div>
  </div>
  <div class="resumen-card entregado">
    <div class="label">A Rendir (Neto)</div>
    <div class="monto" id="resRendir">₲ 0</div>
  </div>
</div>

<div class="filtros" id="filtros">
  <button class="filtro-btn active" onclick="filtrar('todos', this)">Todos</button>
</div>

<div id="lista" class="lista"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 style="margin-bottom:15px; font-family:'Syne'">Nuevo Envío</h2>
    <div class="field"><label>Nombre Cliente</label><input type="text" id="inNombre"></div>
    <div class="field"><label>Ciudad / Barrio</label><input type="text" id="inCiudad"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div class="field"><label>Monto Pedido</label><input type="number" id="inMonto"></div>
      <div class="field"><label>Flete</label><input type="number" id="inFlete"></div>
    </div>
    <button style="width:100%; background:var(--accent); border:none; padding:15px; border-radius:10px; font-weight:800; margin-bottom:10px;" onclick="guardarNuevo()">Guardar en Planilla</button>
    <button style="width:100%; background:none; border:1px solid var(--border); padding:10px; border-radius:10px; color:var(--muted)" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
  // URL DE TU NUEVO SCRIPT
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMx6BTv7X1gXz74i5IcIei6q551VskQ6V-P5ohKnxXmwo7wrps_PfKsnfTMOtpGnhp/exec';
  const SHEET_ID   = '1NLC-CqqtRxiC4FhPjgfNVaG3kPQZMAVY1-HTfitgo18';
  
  let envios = [];
  let filtroActual = 'todos';
  const hoyStr = new Date().toLocaleDateString('es-PY', { day:'2-digit', month:'2-digit', year:'numeric' });
  document.getElementById('fechaDisplay').textContent = hoyStr;

  function mostrarToast(txt) {
    const t = document.getElementById('toast');
    t.textContent = txt; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  // --- SINCRONIZACIÓN REAL CON ANTI-CACHÉ ---
  async function cargarDesdeSheets(feedback = false) {
    const btn = document.getElementById('btnSync');
    btn.classList.add('syncing');
    try {
      // El "nocache" obliga a Google a darte los datos más nuevos del Excel
      const resp = await fetch(`${SCRIPT_URL}?sheetId=${SHEET_ID}&nocache=${Date.now()}`);
      const res = await resp.json();
      if (res.ok) {
        envios = res.data;
        render();
        if (feedback) mostrarToast("✅ Datos actualizados");
      }
    } catch(e) {
      mostrarToast("❌ Error de conexión");
    } finally {
      btn.classList.remove('syncing');
    }
  }

  async function enviarASheets() {
    const payload = encodeURIComponent(JSON.stringify(envios));
    const url = `${SCRIPT_URL}?action=guardar_dia&sheetId=${SHEET_ID}&fecha=${hoyStr}&envios=${payload}&t=${Date.now()}`;
    
    // Usamos mode no-cors para celulares
    fetch(url, { method: 'GET', mode: 'no-cors' });
    mostrarToast("☁️ Sincronizando...");
  }

  function render() {
    const container = document.getElementById('lista');
    const filtrados = filtroActual === 'todos' ? envios : envios.filter(e => e.ciudad === filtroActual);
    
    let totalVendido = 0;
    let totalRendir = 0;

    container.innerHTML = filtrados.map(e => {
      totalVendido += (e.montoBase + (e.extras || 0));
      if (e.estado === 'entregado') {
        totalRendir += (e.montoBase + (e.extras || 0) - e.flete);
      }

      return `
        <div class="envio-card ${e.estado}">
          <div class="envio-header">
            <div class="envio-nombre">${e.nombre}</div>
            <div class="envio-ciudad">📍 ${e.ciudad} ${e.nota ? ' | '+e.nota : ''}</div>
          </div>
          <div class="estado-ciclo">
            <button class="ciclo-btn ${e.estado==='pendiente'?'active-entregado':''}" onclick="cambiarEstado(${e.id},'pendiente')">⏳</button>
            <button class="ciclo-btn ${e.estado==='entregado'?'active-entregado':''}" onclick="cambiarEstado(${e.id},'entregado')">✅</button>
            <button class="ciclo-btn ${e.estado==='cancelado'?'active-entregado':''}" onclick="cambiarEstado(${e.id},'cancelado')">❌</button>
          </div>
          <div class="envio-montos">
            <div class="monto-field"><label>Pedido</label><input type="number" value="${e.montoBase}" onchange="edit(${e.id},'montoBase',this.value)"></div>
            <div class="monto-field"><label>Flete</label><input type="number" value="${e.flete}" onchange="edit(${e.id},'flete',this.value)"></div>
            <div class="monto-field"><label>Total</label><div style="font-weight:800; font-size:14px">₲ ${(e.montoBase + (e.extras||0)).toLocaleString('es-PY')}</div></div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('resTotal').textContent = '₲ ' + totalVendido.toLocaleString('es-PY');
    document.getElementById('resRendir').textContent = '₲ ' + totalRendir.toLocaleString('es-PY');
    actualizarFiltros();
  }

  function cambiarEstado(id, estado) {
    const e = envios.find(x => x.id === id);
    e.estado = estado;
    render();
    enviarASheets();
  }

  function edit(id, campo, valor) {
    const e = envios.find(x => x.id === id);
    e[campo] = parseFloat(valor) || 0;
    render();
    enviarASheets();
  }

  function abrirModal() { document.getElementById('modalOverlay').classList.add('open'); }
  function cerrarModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function guardarNuevo() {
    const n = {
      id: Date.now(),
      nombre: document.getElementById('inNombre').value,
      ciudad: document.getElementById('inCiudad').value,
      montoBase: parseFloat(document.getElementById('inMonto').value) || 0,
      flete: parseFloat(document.getElementById('inFlete').value) || 0,
      extras: 0,
      estado: 'pendiente'
    };
    envios.push(n);
    cerrarModal();
    render();
    enviarASheets();
  }

  function actualizarFiltros() {
    const ciudades = [...new Set(envios.map(e => e.ciudad))];
    const f = document.getElementById('filtros');
    f.innerHTML = `<button class="filtro-btn ${filtroActual==='todos'?'active':''}" onclick="filtrar('todos', this)">Todos</button>`;
    ciudades.forEach(c => {
      f.innerHTML += `<button class="filtro-btn ${filtroActual===c?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`;
    });
  }

  function filtrar(c, btn) {
    filtroActual = c;
    render();
  }

  // Cargar al iniciar
  cargarDesdeSheets();
</script>
</body>
</html>
